<div class="admin-login-container">
  <div class="login-card">
    <div class="login-header">
      <span class="admin-logo">🛡️</span>
      <h2>Portal Administrador</h2>
      <p>Ingresa tus claves de acceso maestro.</p>
    </div>

    <form (submit)="onLogin($event)">
      <div class="error-alert" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <div class="input-wrapper">
          <span>✉️</span>
          <input 
            type="email" 
            [(ngModel)]="correo" 
            name="correo" 
            placeholder="asiscar.asistente@gmail.com" 
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label>Contraseña Maestra</label>
        <div class="input-wrapper">
          <span>🔒</span>
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••" 
            required
          />
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Autenticando...' : 'Acceder al Centro de Control' }}
      </button>

      <button type="button" class="btn-back" (click)="volverAlInicio()" [disabled]="loading">
        Volver a la Página Principal
      </button>
    </form>
  </div>
</div>
